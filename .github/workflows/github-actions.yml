name: Test
run-name: ${{ github.actor }} is testing the Stratoshpere 🚀
on:
  push:
    branches:
      - main
jobs:
  Terraform-Plan-VPC:
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Testing environment prep
        run: |
          echo 'Starting env prep for testing...'
          sudo apt update && sudo apt install -y gnupg software-properties-common curl wget unzip

      - name: Terraform - Installation
        run: |
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install terraform -y
          terraform --version

      - name: AWS CLI - Installation
        run: |
          # sudo curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          # sudo unzip awscliv2.zip
          # sudo ./aws/install
          aws --version

      - name: AWS CLI - Configuration
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }} --profile terraform
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }} --profile terraform

      - name: Check out repository code
        uses: actions/checkout@v6

      - name: VPC - TF Plan
        run: |
          cd ${{ github.workspace }}/infrastructure/vpc
          terraform init
          terraform plan
          aws configure set aws_access_key_id '' --profile terraform
          aws configure set aws_secret_access_key '' --profile terraform


  Helm-Lint:
    runs-on: 'ubuntu-24.04'
    environment: DEVOPS # Approval Gate
    needs: Terraform-Plan-VPC
    steps:
      - name: Testing environment prep
        run: |
          echo 'Starting env prep for testing...'
          sudo apt-get install curl gpg apt-transport-https --yes

      - name: Helm - Installation
        run: |
          curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey | gpg --dearmor | sudo tee /usr/share/keyrings/helm.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list
          sudo apt-get update
          sudo apt-get install helm
          helm version

      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Lint - Build Agents
        run: |
          cd ${{ github.workspace }}/infrastructure/workloads/devops/charts;
          find ./build-agents/charts/ -name "*.tgz" -exec rm -rf {} \;
          helm dependency update ./build-agents;
          helm package ./build-agents --destination ./build-agents/charts;
          find ./build-agents/charts/ -name "*build-agents*.tgz" -exec helm lint --strict {} \;

      - name: Lint - Game 2048
        run: |
          cd ${{ github.workspace }}/infrastructure/workloads/devops/charts;
          find ./game-2048/charts/ -name "*.tgz" -exec rm -rf {} \;
          helm dependency update ./game-2048;
          helm package ./game-2048 --destination ./game-2048/charts;
          find ./game-2048/charts/ -name "*game-2048*.tgz" -exec helm lint --strict {} \;

      - name: Lint - Nginx
        run: |
          cd ${{ github.workspace }}/infrastructure/workloads/devops/charts;
          find ./nginx/charts/ -name "*.tgz" -exec rm -rf {} \;
          helm dependency update ./nginx;
          helm package ./nginx --destination ./nginx/charts;
          find ./nginx/charts/ -name "*nginx*.tgz" -exec helm lint --strict {} \;


  Vulnerabilities-Trivy:
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Vulnerabilities-Trivy
        run: |
          echo 'Starting env prep for testing...'
          sudo apt update && sudo apt install -y gnupg curl wget unzip ca-certificates
          sudo wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          sudo echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y
          trivy fs ${{ github.workspace }}


  Vulnerabilities-SBOM-Syft-Grype:
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Vulnerabilities-SBOM-Syft-Grype
        run: |
          echo 'Starting env prep for testing...'
          sudo apt update && sudo apt install -y gnupg curl wget unzip ca-certificates
          sudo curl -sSfL https://get.anchore.io/syft | sudo sh -s -- -b /usr/local/bin
          sudo curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin
          rm -rf /scans || true
          mkdir /scans
          syft ${{ github.workspace }} -o cyclonedx-json=/scans/sbom.json
          grype sbom:/scans/sbom.json
