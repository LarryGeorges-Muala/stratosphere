stages:
  - plan

default:
  image: ubuntu:24.04

terraform_plan:
  stage: plan
  script:
    - echo 'Starting tests...'
    - apt update && apt install -y gnupg software-properties-common curl wget unzip
    - wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | tee /etc/apt/sources.list.d/hashicorp.list
    - apt update && apt install terraform -y
    - terraform --version
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip awscliv2.zip
    - ./aws/install
    - aws --version
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID --profile terraform
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY --profile terraform
    - cd $CI_PROJECT_DIR/infrastructure/vpc
    - terraform init
    - terraform plan
    - aws configure set aws_access_key_id '' --profile terraform
    - aws configure set aws_secret_access_key '' --profile terraform

helm_lint:
  stage: lint
  script:
    - echo 'Starting env prep for testing...'
    - apt-get install curl gpg apt-transport-https --yes
    - curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey | gpg --dearmor | tee /usr/share/keyrings/helm.gpg > /dev/null
    - echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main" | tee /etc/apt/sources.list.d/helm-stable-debian.list
    - apt-get update
    - apt-get install helm
    - helm version
    - cd $CI_PROJECT_DIR//infrastructure/workloads/devops/charts;
    - find ./build-agents/charts/ -name "*.tgz" -exec rm -rf {} \;
    - helm package ./build-agents --destination ./build-agents/charts;
    - find ./build-agents/charts/ -name "*.tgz" -exec helm lint --strict \;
    - cd $CI_PROJECT_DIR//infrastructure/workloads/devops/charts;
    - find ./game-2048/charts/ -name "*.tgz" -exec rm -rf {} \;
    - helm package ./game-2048 --destination ./game-2048/charts;
    - find ./game-2048/charts/ -name "*.tgz" -exec helm lint --strict \;
    - cd $CI_PROJECT_DIR//infrastructure/workloads/devops/charts;
    - find ./nginx/charts/ -name "*.tgz" -exec rm -rf {} \;
    - helm package ./nginx --destination ./nginx/charts;
    - find ./nginx/charts/ -name "*.tgz" -exec helm lint --strict \;
