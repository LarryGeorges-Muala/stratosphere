# Default values for prometheus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace: "staging"

imagePullSecrets: []

nameOverride: ""

fullnameOverride: "prometheus"

secrets: []

deployments:
  - name: "monitoring"
    kind: DaemonSet
    replicaCount: 1
    containers:
      - name: "api"
        startup:
          enabled: true
          command: ["/bin/prometheus"]
          args:
            - '--config.file=/etc/prometheus-config/prometheus.yml'
            - '--storage.tsdb.path=/.prometheus/_data'
            - '--web.enable-remote-write-receiver'
            - '--enable-feature=exemplar-storage'
            - '--enable-feature=native-histograms'
        targetGroupBinding:
          enabled: false
          arn: ""
          securityGroup: ""
        image:
          repository: prom/prometheus
          pullPolicy: IfNotPresent
          tag: "latest"
        podAnnotations: {}
        podLabels: {}
        podSecurityContext: {}
        securityContext: {}
        service:
          enabled: true
          scheme: internal
          type: ClusterIP
          port: 9090
          extraPorts:
            - name: https
              enabled: false
              port: 443
              protocol: TCP
          annotations: {}
        ingress:
          enabled: false
          className: ""
          annotations: {}
          hosts:
            - host: prometheus.local
              paths:
                - path: /
                  pathType: ImplementationSpecific
          tls: []
        httpRoute:
          enabled: false
          annotations: {}
          parentRefs:
            - name: gateway
              sectionName: http
          hostnames:
            - prometheus.local
          rules:
            - matches:
              - path:
                  type: PathPrefix
                  value: /headers
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command:
              - whoami
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          exec:
            command:
              - whoami
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
          - mountPath: /.prometheus/_data
            name: data-volume
          - name: prometheus-rules
            mountPath: "/etc/prometheus-rules"
            readOnly: false
          - name: prometheus-config
            mountPath: "/etc/prometheus-config"
            readOnly: false

    serviceAccount:
      create: true
      automount: false
      annotations: {}
      name: "prometheus-service-account"

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80

    volumes:
      - name: data-volume
        emptyDir:
          sizeLimit: 500Mi
      - name: prometheus-config
        secret:
          secretName: prometheus-config
          optional: false
      - name: prometheus-rules
        secret:
          secretName: prometheus-rules
          optional: false

    nodeSelector: {}

    tolerations: []

    volumeClaimTemplates:
      name: ""
      storageClassName: ""
      storage: ""

    affinity:
      enabled: false
