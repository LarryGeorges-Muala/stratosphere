apiVersion: v1
kind: Service
metadata:
  name: {{ include "build-agents.fullname" . }}
  namespace: {{ .Values.namespace | default "devops" }}
  labels:
    {{- include "build-agents.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "build-agents.selectorLabels" . | nindent 4 }}
