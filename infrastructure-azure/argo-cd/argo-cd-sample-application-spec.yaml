apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'game-2048'
spec:
  destination:
    name: 'in-cluster'
    namespace: 'game'
  source:
    path: 'infrastructure-azure/workloads/devops/charts/game-2048'
    repoURL: 'https://github.com/LarryGeorges-Muala/stratosphere'
    targetRevision: HEAD
    helm:
      valueFiles:
      - values.yaml
  project: 'default'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
